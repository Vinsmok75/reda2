<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reda Hmoud - Contactez-moi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">Reda.H</a>
            <button class="nav-toggle" aria-label="Ouvrir le menu">
                <i class="fas fa-bars"></i>
            </button>
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Accueil</a>
                <a href="a-propos.html" class="nav-link">À propos de moi</a>
                <a href="projets.html" class="nav-link">Projets - Réalisations</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </nav>
        </div>
    </header>

    <main style="min-height: 100vh; padding-top: 70px; background-color: var(--bg-alt);">
        <section id="contact" class="contact">
            <div class="container">
                <h2 class="section-title">Contactez-moi</h2>
                <div class="contact-wrapper">
                    <form id="contact-form" class="contact-form">
                        <div class="form-group">
                            <label for="nom">Nom complet *</label>
                            <input type="text" id="nom" name="nom" required placeholder="Votre nom">
                        </div>
                        <div class="form-group">
                            <label for="email">Adresse Email *</label>
                            <input type="email" id="email" name="email" required placeholder="Votre email">
                        </div>
                        <div class="form-group">
                            <label for="objet">Objet *</label>
                            <input type="text" id="objet" name="objet" required placeholder="Sujet de votre message">
                        </div>
                        <div class="form-group">
                            <label for="message">Message *</label>
                            <textarea id="message" name="message" rows="5" required placeholder="Comment puis-je vous aider ?"></textarea>
                        </div>
                        <button type="submit" class="btn-submit">Envoyer le message</button>
                        <div id="form-status" class="form-status"></div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Reda Hmoud. Tous droits réservés.</p>
            <p>Étudiant en Business Administration - HECI Meknès</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
